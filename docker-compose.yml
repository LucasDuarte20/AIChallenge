services:
  # Base de datos
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-agendadb}
      POSTGRES_USER: ${POSTGRES_USER:-agendauser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-agendapass}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql  # (opcional) extensiones
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-agendauser} -d ${POSTGRES_DB:-agendadb}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Admin DB (opcional)
  adminer:
    image: adminer:4
    ports:
      - "${ADMINER_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy

  # Backend API (FastAPI)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-agendauser}:${POSTGRES_PASSWORD:-agendapass}@postgres:5432/${POSTGRES_DB:-agendadb}
    volumes:
      - ./backend/app:/app/app
      - ./data:/app/data
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
    # healthcheck:
    #   test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
    #   interval: 15s
    #   timeout: 5s
    #   retries: 5

volumes:
  postgres_data:

